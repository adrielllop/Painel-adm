<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔐 Gerador de Keys | MestreXit Admin (Bronze/Prata/Ouro)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #06060c;
            --glass-bg: rgba(14, 14, 24, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #c9a84c;
            --text-primary: #f1f0ee;
            --text-secondary: #b0a999;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-full: 9999px;
        }
        body {
            background: #04040a;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://i.postimg.cc/fLCtn42W/d47bfca6ab726a068fce95088b9e4957.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.35) saturate(0.7);
            z-index: -1;
        }
        .admin-container {
            max-width: 1000px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 36px 30px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            animation: fadeSlideUp 0.7s ease both;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 38px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 14px;
            background: linear-gradient(160deg, #f5e6c8, #d4b87a, #c9a84c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .keys-panel {
            background: rgba(10, 10, 20, 0.55);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            padding: 22px 20px;
            margin-bottom: 26px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .key-list {
            max-height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .key-item {
            background: rgba(20, 20, 32, 0.7);
            padding: 18px 20px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            border-left: 5px solid var(--accent);
            transition: all 0.25s;
        }
        .key-code {
            font-family: monospace;
            font-weight: 700;
            font-size: 17px;
            color: #f0e4c8;
        }
        .key-meta {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .badge-patente {
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            margin-left: 8px;
            background: rgba(0,0,0,0.5);
        }
        .patente-bronze { color: #cd7f32; border: 1px solid #cd7f32; }
        .patente-prata { color: #c0c0c0; border: 1px solid #c0c0c0; }
        .patente-ouro { color: #ffd700; border: 1px solid #ffd700; }
        .key-status {
            font-size: 11px;
            padding: 5px 14px;
            border-radius: var(--radius-full);
            font-weight: 700;
        }
        .status-active { background: rgba(34,197,94,0.2); color: #7dff7d; }
        .status-paused { background: rgba(251,191,36,0.2); color: #ffb84d; }
        .status-expired { background: rgba(239,68,68,0.2); color: #ff7b7b; }
        .key-actions button {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            margin-left: 6px;
            cursor: pointer;
            transition: 0.2s;
            color: #ddd;
        }
        .key-actions button:hover { background: white; color: black; }
        .delete-btn:hover { background: #ef4444 !important; color: white !important; }
        .gerador-box {
            background: rgba(8, 8, 18, 0.6);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            padding: 26px 24px;
        }
        .input-group, .duration-group, .patente-group {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(20, 20, 32, 0.6);
            padding: 14px 20px;
            border-radius: var(--radius-full);
            margin-bottom: 14px;
        }
        .input-group label, .duration-group label, .patente-group label {
            background: rgba(255,255,255,0.06);
            padding: 9px 18px;
            border-radius: var(--radius-full);
            font-weight: 600;
            color: #d4c29d;
        }
        .input-group input, .duration-group input, .patente-group select {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 13px 20px;
            border-radius: var(--radius-full);
            color: white;
            font-family: monospace;
        }
        .btn-gerar {
            background: linear-gradient(135deg, #f5e2a9, #d4b060);
            color: #0a0a0f;
            font-weight: 800;
            border: none;
            padding: 17px;
            width: 100%;
            border-radius: var(--radius-full);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .success-feedback {
            background: rgba(34,197,94,0.1);
            margin-top: 18px;
            padding: 14px 20px;
            border-radius: var(--radius-full);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            align-items: center;
        }
        .error-toast { color: #ff9e9e; margin-top: 10px; }
        .copy-btn-small {
            background: rgba(59,130,246,0.2);
            border: 1px solid #3b82f6;
            border-radius: var(--radius-full);
            padding: 6px 12px;
            cursor: pointer;
            color: #a0c4ff;
        }
        .copy-btn-small:hover { background: #3b82f6; color: white; }
    </style>
</head>
<body>
<div class="admin-container">
    <h1><i class="fas fa-key"></i> MestreXit Key Manager</h1>
    <div class="subtitle">
        <span><i class="fas fa-layer-group"></i> Patentes: Bronze | Prata | Ouro</span>
        <span><i class="fas fa-lock-open"></i> Admin total</span>
    </div>

    <div class="keys-panel">
        <div class="panel-header">
            <h3><i class="fas fa-list-ul"></i> Chaves cadastradas</h3>
            <span id="totalKeys">0 chaves</span>
        </div>
        <div id="keysListContainer" class="key-list">Carregando...</div>
    </div>

    <div class="gerador-box">
        <h3><i class="fas fa-plus-circle"></i> Gerar nova chave</h3>
        <div class="input-group">
            <label><i class="fas fa-font"></i> Prefixo</label>
            <input type="text" id="customPrefix" value="MESTRESENSI-">
        </div>
        <div class="input-group">
            <label><i class="fas fa-tag"></i> Sufixo</label>
            <input type="text" id="customSuffix" placeholder="automático se vazio">
        </div>
        <div class="patente-group">
            <label><i class="fas fa-medal"></i> Patente</label>
            <select id="patenteSelect">
                <option value="Bronze">🥉 Bronze</option>
                <option value="Prata">🥈 Prata</option>
                <option value="Ouro" selected>🥇 Ouro</option>
            </select>
        </div>
        <div class="duration-group">
            <label><i class="fas fa-hourglass-half"></i> Duração</label>
            <input type="number" id="durationValue" min="0" value="0" disabled>
            <select id="durationUnit">
                <option value="permanent" selected>Permanente</option>
                <option value="minutes">Minutos</option>
                <option value="hours">Horas</option>
                <option value="days">Dias</option>
                <option value="months">Meses</option>
                <option value="years">Anos</option>
            </select>
        </div>
        <button class="btn-gerar" id="generateBtn"><i class="fas fa-magic"></i> Gerar Key</button>
        <div id="generateFeedback" class="success-feedback" style="display: none;">
            <span id="generatedKeyDisplay"></span>
            <button id="copyGeneratedBtn" class="copy-btn-small"><i class="far fa-copy"></i> Copiar</button>
        </div>
        <div id="generateError" class="error-toast"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCxZoiw8h9ZCGxF1XP871DFIQ2tX40RPkg",
        authDomain: "mestrexit-327fd.firebaseapp.com",
        projectId: "mestrexit-327fd",
        storageBucket: "mestrexit-327fd.firebasestorage.app",
        messagingSenderId: "352059845970",
        appId: "1:352059845970:web:45f33fcfb8595de7c6de8b"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const keysCollection = collection(db, "keys");

    // ======================= FUNÇÃO DE COPIAR ROBUSTA =======================
    async function copyToClipboard(text, buttonElement) {
        try {
            // Tenta a API moderna
            await navigator.clipboard.writeText(text);
            showCopyFeedback(buttonElement, true);
        } catch (err) {
            // Fallback para browsers antigos
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            const success = document.execCommand('copy');
            document.body.removeChild(textarea);
            if (success) {
                showCopyFeedback(buttonElement, true);
            } else {
                showCopyFeedback(buttonElement, false);
            }
        }
    }

    function showCopyFeedback(button, success) {
        if (!button) return;
        const originalHTML = button.innerHTML;
        if (success) {
            button.innerHTML = '<i class="fas fa-check"></i> Copiado!';
        } else {
            button.innerHTML = '<i class="fas fa-times"></i> Falhou!';
        }
        setTimeout(() => {
            button.innerHTML = originalHTML;
        }, 2000);
    }
    // ========================================================================

    const container = document.getElementById('keysListContainer');
    const totalSpan = document.getElementById('totalKeys');
    const prefixInput = document.getElementById('customPrefix');
    const suffixInput = document.getElementById('customSuffix');
    const patenteSelect = document.getElementById('patenteSelect');
    const durationValue = document.getElementById('durationValue');
    const durationUnit = document.getElementById('durationUnit');
    const generateBtn = document.getElementById('generateBtn');
    const generateError = document.getElementById('generateError');
    const feedbackDiv = document.getElementById('generateFeedback');
    const generatedKeySpan = document.getElementById('generatedKeyDisplay');
    const copyGeneratedBtn = document.getElementById('copyGeneratedBtn');

    function randomString(len = 8) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let r = "";
        for (let i = 0; i < len; i++) r += chars.charAt(Math.floor(Math.random() * chars.length));
        return r;
    }

    async function isKeyTaken(key) {
        const q = query(keysCollection, where("keyString", "==", key));
        const snap = await getDocs(q);
        return !snap.empty;
    }

    async function generateUniqueKey(prefix, suffix) {
        const trimmedPrefix = prefix.trim();
        const trimmedSuffix = suffix.trim();
        if (trimmedPrefix !== "") {
            if (trimmedSuffix !== "") {
                const full = trimmedPrefix + trimmedSuffix;
                if (await isKeyTaken(full)) throw new Error(`Chave ${full} já existe`);
                return full;
            } else {
                const all = await getDocs(keysCollection);
                let max = 0;
                all.forEach(doc => {
                    let k = doc.data().keyString;
                    if (k.startsWith(trimmedPrefix)) {
                        let num = parseInt(k.slice(trimmedPrefix.length));
                        if (!isNaN(num) && num > max) max = num;
                    }
                });
                let candidate = (max+1).toString();
                while (await isKeyTaken(trimmedPrefix + candidate)) {
                    max++;
                    candidate = (max+1).toString();
                }
                return trimmedPrefix + candidate;
            }
        } else {
            if (trimmedSuffix !== "") {
                if (await isKeyTaken(trimmedSuffix)) throw new Error(`Chave ${trimmedSuffix} já existe`);
                return trimmedSuffix;
            } else {
                let rand = randomString(8);
                while (await isKeyTaken(rand)) rand = randomString(8);
                return rand;
            }
        }
    }

    async function addNewKey(prefix, suffix, patente, durValue, durUnit) {
        const keyStr = await generateUniqueKey(prefix, suffix);
        let expiresIn = 'permanent';
        if (durUnit !== 'permanent' && durValue > 0) expiresIn = `${durValue} ${durUnit}`;
        await addDoc(keysCollection, {
            keyString: keyStr,
            status: "active",
            createdAt: serverTimestamp(),
            expiresIn: expiresIn,
            patente: patente
        });
        return keyStr;
    }

    async function deleteKey(docId) { await deleteDoc(doc(db, "keys", docId)); }
    async function toggleStatus(docId, newStatus) { await updateDoc(doc(db, "keys", docId), { status: newStatus }); }

    function isExpired(createdAt, expiresIn) {
        if (!createdAt || !expiresIn || expiresIn === 'permanent') return false;
        let parts = expiresIn.split(' ');
        let val = parseInt(parts[0]), unit = parts[1];
        let ms = 0;
        if (unit === 'minutes') ms = val * 60000;
        else if (unit === 'hours') ms = val * 3600000;
        else if (unit === 'days') ms = val * 86400000;
        else if (unit === 'months') ms = val * 30 * 86400000;
        else if (unit === 'years') ms = val * 365 * 86400000;
        else return false;
        return Timestamp.now().toMillis() > (createdAt.toMillis() + ms);
    }

    function formatExpiration(createdAt, expiresIn) {
        if (!createdAt) return '?';
        if (!expiresIn || expiresIn === 'permanent') return '🔓 Permanente';
        let parts = expiresIn.split(' ');
        let val = parseInt(parts[0]), unit = parts[1];
        let ms = 0;
        if (unit === 'minutes') ms = val * 60000;
        else if (unit === 'hours') ms = val * 3600000;
        else if (unit === 'days') ms = val * 86400000;
        else if (unit === 'months') ms = val * 30 * 86400000;
        else if (unit === 'years') ms = val * 365 * 86400000;
        if (!ms) return expiresIn;
        let expDate = new Date(createdAt.toMillis() + ms);
        return `⏳ Expira ${expDate.toLocaleDateString('pt-BR')} ${expDate.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
    }

    function startListening() {
        if (window._unsub) window._unsub();
        window._unsub = onSnapshot(keysCollection, (snap) => {
            let keys = [];
            snap.forEach(d => keys.push({ id: d.id, ...d.data() }));
            totalSpan.innerText = `${keys.length} chave${keys.length !== 1 ? 's' : ''}`;
            if (keys.length === 0) { container.innerHTML = '<div>Nenhuma chave cadastrada.</div>'; return; }
            keys.sort((a,b) => (b.createdAt?.toMillis?.()||0) - (a.createdAt?.toMillis?.()||0));
            let html = '';
            keys.forEach(k => {
                const expired = isExpired(k.createdAt, k.expiresIn);
                let statusText = '', statusClass = '';
                if (k.status !== 'active') { statusText = 'PAUSADA'; statusClass = 'status-paused'; }
                else if (expired) { statusText = 'EXPIRADA'; statusClass = 'status-expired'; }
                else { statusText = 'ATIVA'; statusClass = 'status-active'; }
                const patenteClass = k.patente === 'Bronze' ? 'patente-bronze' : (k.patente === 'Prata' ? 'patente-prata' : 'patente-ouro');
                html += `
                    <div class="key-item">
                        <div>
                            <div class="key-code">🔑 ${k.keyString} <span class="badge-patente ${patenteClass}">${k.patente || 'Bronze'}</span></div>
                            <div class="key-meta">${formatExpiration(k.createdAt, k.expiresIn)}</div>
                            <span class="key-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="key-actions">
                            ${(k.status === 'active' && !expired) ? `<button class="pause-btn" data-id="${k.id}">⏸️ Pausar</button>` : `<button class="reactivate-btn" data-id="${k.id}">▶️ Reativar</button>`}
                            <button class="copy-key-btn" data-key="${k.keyString}"><i class="far fa-copy"></i> Copiar</button>
                            <button class="delete-btn" data-id="${k.id}"><i class="fas fa-trash"></i> Excluir</button>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;

            // Eventos das ações
            document.querySelectorAll('.pause-btn').forEach(b => b.addEventListener('click', () => toggleStatus(b.dataset.id, 'paused')));
            document.querySelectorAll('.reactivate-btn').forEach(b => b.addEventListener('click', () => toggleStatus(b.dataset.id, 'active')));
            document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', async (e) => { if(confirm('Excluir permanentemente?')) await deleteKey(b.dataset.id); }));
            document.querySelectorAll('.copy-key-btn').forEach(b => b.addEventListener('click', (e) => {
                const key = b.dataset.key;
                copyToClipboard(key, b);
            }));
        });
    }

    durationUnit.addEventListener('change', () => { durationValue.disabled = (durationUnit.value === 'permanent'); if(durationValue.disabled) durationValue.value=0; else if(durationValue.value==0) durationValue.value=1; });
    
    generateBtn.addEventListener('click', async () => {
        generateError.innerText = '';
        feedbackDiv.style.display = 'none';
        const prefix = prefixInput.value;
        const suffix = suffixInput.value;
        const patente = patenteSelect.value;
        let durVal = parseInt(durationValue.value) || 0;
        const durUnit = durationUnit.value;
        if (durUnit !== 'permanent' && durVal <= 0) { generateError.innerText = 'Valor de duração inválido'; return; }
        try {
            const newKey = await addNewKey(prefix, suffix, patente, durVal, durUnit);
            generatedKeySpan.innerText = `✅ Chave gerada: ${newKey} (${patente})`;
            feedbackDiv.style.display = 'flex';
            // Configura o botão de copiar dentro do feedback
            copyGeneratedBtn.onclick = (e) => {
                e.preventDefault();
                copyToClipboard(newKey, copyGeneratedBtn);
            };
            // Limpa campos para nova geração
            prefixInput.value = 'MESTRESENSI-';
            suffixInput.value = '';
        } catch(err) { generateError.innerText = err.message; }
    });

    startListening();
</script>
</body>
</html>
