<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Gerador de Keys | MestreXit Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0b0f;
      font-family: 'Segoe UI', 'Poppins', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .admin-container {
      max-width: 900px;
      width: 100%;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 32px;
      padding: 32px 28px;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 255, 255, 0.05);
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff, #bbb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      color: #aaa;
      margin-bottom: 30px;
      border-bottom: 1px dashed #444;
      padding-bottom: 12px;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .auth-lock {
      background: #1e1e2a;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 13px;
      border: 1px solid #ffffff40;
    }
    .keys-panel {
      background: #11131a;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 25px;
      border: 1px solid #2a2e3a;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .panel-header h3 {
      font-size: 20px;
      font-weight: 500;
    }
    .key-list {
      max-height: 380px;
      overflow-y: auto;
      padding-right: 6px;
    }
    .key-item {
      background: #1a1d27;
      margin-bottom: 10px;
      padding: 16px 18px;
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 5px solid #fff;
      transition: 0.15s;
    }
    .key-item:hover {
      background: #202433;
    }
    .key-code {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 18px;
      letter-spacing: 1px;
    }
    .key-meta {
      font-size: 12px;
      color: #bbb;
      margin-top: 4px;
    }
    .key-status {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 30px;
      background: #2c2f3c;
      display: inline-block;
      margin-top: 6px;
    }
    .status-active { color: #6eff6e; background: #1e3a1e; }
    .status-paused { color: #ffb347; background: #3a2e1a; }
    .status-expired { color: #ff6b6b; background: #3a1e1e; }
    .key-actions {
      display: flex;
      gap: 8px;
    }
    .key-actions button {
      background: transparent;
      border: 1px solid #ffffff70;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .key-actions button:hover {
      background: white;
      color: black;
      border-color: white;
    }
    .delete-btn {
      border-color: #ff5e5e !important;
      color: #ff9e9e !important;
    }
    .delete-btn:hover {
      background: #ff5e5e !important;
      color: black !important;
    }
    .gerador-box {
      background: #0e1018;
      border-radius: 28px;
      padding: 24px;
      border: 1px solid #2f3545;
    }
    .suffix-group, .duration-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      background: #1a1d2a;
      padding: 12px 18px;
      border-radius: 60px;
      margin-bottom: 15px;
      border: 1px solid #3d4455;
    }
    .suffix-group label, .duration-group label {
      font-weight: 600;
      background: #2f3545;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 14px;
    }
    .suffix-group input {
      flex: 1;
      background: #0b0e14;
      border: 1px solid #5f6a7e;
      padding: 12px 18px;
      border-radius: 40px;
      color: white;
      font-family: monospace;
      font-size: 15px;
    }
    .duration-group input {
      width: 80px;
      background: #0b0e14;
      border: 1px solid #5f6a7e;
      padding: 12px;
      border-radius: 40px;
      color: white;
      text-align: center;
    }
    .duration-group select {
      flex: 1;
      background: #0b0e14;
      border: 1px solid #5f6a7e;
      padding: 12px 18px;
      border-radius: 40px;
      color: white;
      font-weight: 500;
    }
    .btn-gerar {
      background: white;
      color: black;
      font-weight: bold;
      border: none;
      padding: 16px 20px;
      width: 100%;
      border-radius: 60px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn-gerar:hover {
      background: #ddd;
      transform: scale(0.99);
    }
    .preview {
      text-align: center;
      margin-top: 15px;
      font-family: monospace;
      background: #00000050;
      padding: 8px;
      border-radius: 40px;
      font-size: 15px;
      border: 1px dashed #6f7a8e;
    }
    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 30px;
    }
    .footer-note {
      margin-top: 16px;
      text-align: right;
      font-size: 13px;
      color: #6a7285;
    }
    .error-toast {
      color: #ff7b7b;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="admin-container" id="appContainer">
  <h1><i class="fas fa-key"></i> MestreXit Key Manager</h1>
  <div class="subtitle">
    <span><i class="fas fa-database"></i> Firebase · Coleção "keys"</span>
    <span class="auth-lock" id="authStatus"><i class="fas fa-lock-open"></i> Acesso autorizado</span>
  </div>

  <!-- Painel de listagem -->
  <div class="keys-panel">
    <div class="panel-header">
      <h3><i class="fas fa-list-ul"></i> Chaves ativas / pausadas</h3>
      <span id="totalKeys">0 chaves</span>
    </div>
    <div id="keysListContainer" class="key-list">
      <div class="empty-msg">Carregando chaves...</div>
    </div>
  </div>

  <!-- Gerador de novas keys -->
  <div class="gerador-box">
    <h3 style="margin-bottom: 16px; display: flex; gap: 10px;"><i class="fas fa-plus-circle"></i> Gerar nova chave</h3>
    <div class="suffix-group">
      <label><i class="fas fa-tag"></i> Sufixo</label>
      <input type="text" id="customSuffix" placeholder="Ex: 2025, XT-ALPHA, 777 (vazio = automático)" autocomplete="off">
    </div>
    <div class="duration-group">
      <label><i class="fas fa-hourglass-half"></i> Duração</label>
      <input type="number" id="durationValue" min="0" value="0" step="1" disabled>
      <select id="durationUnit">
        <option value="permanent" selected>Permanente</option>
        <option value="minutes">Minutos</option>
        <option value="hours">Horas</option>
        <option value="days">Dias</option>
        <option value="months">Meses</option>
        <option value="years">Anos</option>
      </select>
    </div>
    <button class="btn-gerar" id="generateBtn"><i class="fas fa-magic"></i> Gerar Key (MESTRESENSI-)</button>
    <div id="previewDisplay" class="preview">🔑 MESTRESENSI- (automático)</div>
    <div id="generateError" class="error-toast"></div>
  </div>
  <div class="footer-note">
    <i class="fas fa-shield-alt"></i> Admin · Sincronizado em tempo real
  </div>
</div>

<!-- Autenticação inicial (modal simples) -->
<div id="authOverlay" style="position: fixed; top:0; left:0; width:100%; height:100%; background: #000000dd; backdrop-filter: blur(10px); z-index:999; display: flex; align-items: center; justify-content: center;">
  <div style="background: #12141c; border: 1px solid white; border-radius: 36px; padding: 40px; width: 90%; max-width: 420px; text-align: center;">
    <i class="fas fa-user-shield" style="font-size: 48px; margin-bottom: 20px; color:white;"></i>
    <h2 style="margin-bottom: 10px;">Área Restrita</h2>
    <p style="color:#bbb; margin-bottom: 25px;">Digite a chave de administrador</p>
    <input type="password" id="adminPassInput" placeholder="••••••••" style="width:100%; padding:16px; border-radius:60px; background:black; border:1px solid white; color:white; font-size:18px; text-align:center; margin-bottom:15px;">
    <button id="authSubmitBtn" style="width:100%; padding:14px; border-radius:60px; border:none; background:white; color:black; font-weight:bold; font-size:18px; cursor:pointer;">Acessar</button>
    <div id="authError" style="color:#ff6b6b; margin-top:15px;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    query, 
    where, 
    getDocs, 
    addDoc, 
    updateDoc, 
    deleteDoc, 
    doc, 
    onSnapshot,
    serverTimestamp,
    Timestamp 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Mesma config do projeto original
  const firebaseConfig = {
    apiKey: "AIzaSyCxZoiw8h9ZCGxF1XP871DFIQ2tX40RPkg",
    authDomain: "mestrexit-327fd.firebaseapp.com",
    projectId: "mestrexit-327fd",
    storageBucket: "mestrexit-327fd.firebasestorage.app",
    messagingSenderId: "352059845970",
    appId: "1:352059845970:web:45f33fcfb8595de7c6de8b",
    measurementId: "G-9PDKN5SZ0V"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const keysCollection = collection(db, "keys");

  const SECRET_ADMIN_KEY = "07058377";
  const KEY_PREFIX = "MESTRESENSI-";

  let authUnlocked = false;
  let unsubscribe = null;

  // Elementos
  const authOverlay = document.getElementById('authOverlay');
  const passInput = document.getElementById('adminPassInput');
  const authBtn = document.getElementById('authSubmitBtn');
  const authError = document.getElementById('authError');
  const container = document.getElementById('keysListContainer');
  const totalSpan = document.getElementById('totalKeys');
  const suffixInput = document.getElementById('customSuffix');
  const durationValue = document.getElementById('durationValue');
  const durationUnit = document.getElementById('durationUnit');
  const previewDisplay = document.getElementById('previewDisplay');
  const generateBtn = document.getElementById('generateBtn');
  const generateError = document.getElementById('generateError');
  const authStatusSpan = document.getElementById('authStatus');

  // ---------- Funções de tempo (idênticas ao original) ----------
  function parseDuration(value, unit) {
    if (unit === 'permanent' || value <= 0) return null;
    const num = parseInt(value) || 0;
    if (num <= 0) return null;
    let ms = 0;
    switch (unit) {
      case 'minutes': ms = num * 60 * 1000; break;
      case 'hours': ms = num * 60 * 60 * 1000; break;
      case 'days': ms = num * 24 * 60 * 60 * 1000; break;
      case 'months': ms = num * 30 * 24 * 60 * 60 * 1000; break;
      case 'years': ms = num * 365 * 24 * 60 * 60 * 1000; break;
      default: return null;
    }
    return { ms, label: `${num} ${unit}` };
  }

  function isKeyExpired(createdAt, expiresIn) {
    if (!createdAt || !expiresIn || expiresIn === 'permanent') return false;
    const parts = expiresIn.split(' ');
    if (parts.length < 2) return false;
    const value = parseInt(parts[0]);
    const unit = parts[1];
    const duration = parseDuration(value, unit);
    if (!duration) return false;
    const now = Timestamp.now();
    const createdAtMs = createdAt.toMillis();
    const expirationMs = createdAtMs + duration.ms;
    return now.toMillis() > expirationMs;
  }

  function formatExpiration(createdAt, expiresIn) {
    if (!createdAt) return 'Data desconhecida';
    if (!expiresIn || expiresIn === 'permanent') return '🔓 Permanente';
    try {
      const parts = expiresIn.split(' ');
      const value = parseInt(parts[0]);
      const unit = parts[1];
      const duration = parseDuration(value, unit);
      if (!duration) return expiresIn;
      const expDate = new Date(createdAt.toMillis() + duration.ms);
      return `⏳ Expira ${expDate.toLocaleDateString('pt-BR')} ${expDate.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
    } catch { return expiresIn; }
  }

  // ---------- Verificação de sufixo duplicado ----------
  async function isSuffixTaken(suffix) {
    const full = KEY_PREFIX + suffix;
    const q = query(keysCollection, where("keyString", "==", full));
    const snapshot = await getDocs(q);
    return !snapshot.empty;
  }

  async function generateNewKeyString(customSuffix) {
    let finalSuffix = customSuffix.trim();
    if (finalSuffix === "") {
      const allKeys = await getDocs(keysCollection);
      let maxNum = 0;
      allKeys.forEach(doc => {
        const keyStr = doc.data().keyString;
        if (keyStr && keyStr.startsWith(KEY_PREFIX)) {
          const suffixPart = keyStr.substring(KEY_PREFIX.length);
          const num = parseInt(suffixPart, 10);
          if (!isNaN(num) && num > maxNum) maxNum = num;
        }
      });
      let candidate = (maxNum + 1).toString();
      while (await isSuffixTaken(candidate)) {
        maxNum++;
        candidate = maxNum.toString();
      }
      return KEY_PREFIX + candidate;
    } else {
      if (await isSuffixTaken(finalSuffix)) {
        throw new Error(`Sufixo "${finalSuffix}" já existe!`);
      }
      return KEY_PREFIX + finalSuffix;
    }
  }

  // ---------- Adicionar chave ----------
  async function addNewKey(suffix, durValue, durUnit) {
    const newKeyStr = await generateNewKeyString(suffix);
    let expiresIn = 'permanent';
    if (durUnit !== 'permanent' && durValue > 0) {
      expiresIn = `${durValue} ${durUnit}`;
    }
    await addDoc(keysCollection, {
      keyString: newKeyStr,
      status: "active",
      createdAt: serverTimestamp(),
      expiresIn: expiresIn
    });
  }

  // ---------- Ações ----------
  async function deleteKey(docId) {
    await deleteDoc(doc(db, "keys", docId));
  }

  async function toggleStatus(docId, newStatus) {
    await updateDoc(doc(db, "keys", docId), { status: newStatus });
  }

  // ---------- Renderizar lista em tempo real ----------
  function startListening() {
    if (unsubscribe) unsubscribe();
    unsubscribe = onSnapshot(keysCollection, (snapshot) => {
      const keysArray = [];
      snapshot.forEach(doc => keysArray.push({ id: doc.id, ...doc.data() }));
      
      totalSpan.innerText = `${keysArray.length} chave${keysArray.length !== 1 ? 's' : ''}`;
      
      if (keysArray.length === 0) {
        container.innerHTML = `<div class="empty-msg">✨ Nenhuma chave cadastrada. Gere uma nova acima.</div>`;
        return;
      }
      
      let html = '';
      keysArray.sort((a, b) => {
        const timeA = a.createdAt?.toMillis?.() || 0;
        const timeB = b.createdAt?.toMillis?.() || 0;
        return timeB - timeA;
      });
      
      keysArray.forEach(k => {
        const isActive = k.status === 'active';
        const expired = (k.createdAt && k.expiresIn) ? isKeyExpired(k.createdAt, k.expiresIn) : false;
        const expInfo = formatExpiration(k.createdAt, k.expiresIn);
        
        let statusClass = '';
        let statusText = '';
        if (!isActive) {
          statusClass = 'status-paused';
          statusText = 'PAUSADA';
        } else if (expired) {
          statusClass = 'status-expired';
          statusText = 'EXPIRADA';
        } else {
          statusClass = 'status-active';
          statusText = 'ATIVA';
        }
        
        const actionButtons = [];
        if (isActive && !expired) {
          actionButtons.push(`<button class="pause-btn" data-id="${k.id}">⏸️ Pausar</button>`);
        } else if (!isActive || expired) {
          actionButtons.push(`<button class="reactivate-btn" data-id="${k.id}">▶️ Reativar</button>`);
        }
        actionButtons.push(`<button class="delete-btn" data-id="${k.id}"><i class="fas fa-trash"></i> Excluir</button>`);
        
        html += `
          <div class="key-item">
            <div style="flex:1;">
              <div class="key-code">🔑 ${k.keyString}</div>
              <div class="key-meta">${expInfo}</div>
              <span class="key-status ${statusClass}">${statusText}</span>
            </div>
            <div class="key-actions">
              ${actionButtons.join('')}
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
      
      // Attach listeners
      document.querySelectorAll('.pause-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleStatus(btn.dataset.id, 'paused'));
      });
      document.querySelectorAll('.reactivate-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleStatus(btn.dataset.id, 'active'));
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (confirm('Excluir esta chave permanentemente?')) {
            await deleteKey(btn.dataset.id);
          }
        });
      });
    });
  }

  // ---------- UI: preview e habilitações ----------
  function updatePreview() {
    let suffix = suffixInput.value.trim();
    previewDisplay.innerHTML = `🔑 MESTRESENSI-${suffix === "" ? "(automático)" : suffix}`;
  }
  
  function handleUnitChange() {
    if (durationUnit.value === 'permanent') {
      durationValue.disabled = true;
      durationValue.value = 0;
    } else {
      durationValue.disabled = false;
      if (durationValue.value == 0) durationValue.value = 1;
    }
    updatePreview();
  }

  // ---------- Inicialização após autenticação ----------
  function unlockAdmin() {
    authOverlay.style.display = 'none';
    authUnlocked = true;
    authStatusSpan.innerHTML = '<i class="fas fa-lock-open"></i> Admin autenticado';
    startListening();
    updatePreview();
  }

  // ---------- Autenticação ----------
  authBtn.addEventListener('click', () => {
    const pwd = passInput.value.trim();
    if (pwd === SECRET_ADMIN_KEY) {
      unlockAdmin();
    } else {
      authError.innerText = 'Chave incorreta!';
      passInput.value = '';
    }
  });
  passInput.addEventListener('keypress', (e) => {
    if(e.key === 'Enter') authBtn.click();
  });

  // Configura listeners da UI de geração
  suffixInput.addEventListener('input', updatePreview);
  durationUnit.addEventListener('change', handleUnitChange);
  durationValue.addEventListener('input', updatePreview);
  
  generateBtn.addEventListener('click', async () => {
    generateError.innerText = '';
    const suffix = suffixInput.value.trim();
    const val = parseInt(durationValue.value) || 0;
    const unit = durationUnit.value;
    
    if (unit !== 'permanent' && val <= 0) {
      generateError.innerText = 'Defina um valor maior que zero.';
      return;
    }
    
    try {
      await addNewKey(suffix, val, unit);
      // Limpar campos
      suffixInput.value = '';
      durationUnit.value = 'permanent';
      durationValue.value = 0;
      durationValue.disabled = true;
      updatePreview();
      generateError.innerText = '';
    } catch (err) {
      generateError.innerText = err.message;
    }
  });

  // Pequeno ajuste: já iniciar com preview
  handleUnitChange();
</script>
</body>
</html>
